<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شات بوت النباتات</title>
<style>
body {font-family: Arial; background:#f4f8f6; text-align:center;}
#chat {max-width:500px; margin:50px auto; background:#fff; padding:20px; border-radius:10px;}
input {width:70%; padding:10px;}
button {padding:10px;}
.msg {margin:10px;}
</style>
</head>
<body>

<div id="chat">
<h2>🌿 شات بوت النباتات</h2>
<div id="messages"></div>

<input id="input" placeholder="اكتب سؤالك">
<button onclick="send()">إرسال</button>
</div>

<script>
async function send(){
    let msg = document.getElementById("input").value;
    if(!msg) return;

    add("👤 " + msg);

    let res = await fetch("/api/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();
    add("🤖 " + data.reply);

    document.getElementById("input").value="";
}

function add(text){
    let div = document.createElement("div");
    div.className="msg";
    div.innerText=text;
    document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
