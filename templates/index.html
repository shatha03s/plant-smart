<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المرشد الذكي للنباتات</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">
    <img src="{{ url_for('static', filename='images/moe-logo.png') }}" class="logo">

    <div class="title">
        <h1>الإدارة العامة للتعليم بمحافظة الطائف</h1>
        <p>قسم الأمن والسلامة والمرافق</p>
    </div>
</header>

<!-- ===== CHAT BOX ===== -->
<div class="chat-container">

    <div id="messages" class="messages"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="اكتب سؤالك عن النبات...">
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="send()">إرسال</button>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
    جميع الحقوق محفوظة © قسم الأمن والسلامة والمرافق 2026
</footer>

<!-- ===== SCRIPT ===== -->
<script>
async function send() {

    let input = document.getElementById("input").value;
    let file = document.getElementById("imageInput").files[0];
    let messages = document.getElementById("messages");

    if (!input && !file) return;

    // عرض رسالة المستخدم
    messages.innerHTML += `<div class="msg user">${input || "📷 صورة مرفقة"}</div>`;

    let formData = new FormData();
    formData.append("message", input);
    if (file) formData.append("image", file);

    let res = await fetch("/chat", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    messages.innerHTML += `<div class="msg bot">${data.reply}</div>`;

    document.getElementById("input").value = "";
    document.getElementById("imageInput").value = "";
}
</script>

</body>
</html>
